name: Test

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # NextAuth refuses every request (including credentials sign-in) with a
      # generic "Configuration" error if no secret is set — this repo has no
      # CI secrets configured, so a throwaway value is fine here.
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-test-secret-not-used-in-production
      # Lets tests/e2e/adminUsersColumnSearch.spec.ts sign up and sign in as
      # an admin account (requireAdmin() in src/app/admin/**/page.tsx gates on
      # an exact process.env.ADMIN_EMAIL match) to cover /admin/users e2e.
      ADMIN_EMAIL: e2e-admin@test.local
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
