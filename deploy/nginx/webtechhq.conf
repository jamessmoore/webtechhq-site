# nginx site config for webtechhq.com, as deployed on the EC2 host
# (/etc/nginx/sites-available/webtechhq, symlinked from sites-enabled).
#
# This file is checked in for reference/drift detection — it is NOT
# automatically applied by the deploy pipeline. After editing, copy it to
# the server and run `sudo nginx -t && sudo systemctl reload nginx`.
#
# Static asset paths are aliased through the `current` symlink
# (/srv/webtechhq/current -> releases/<timestamp>/) used by the
# release-based deploy in deploy/remote-deploy.sh. If that layout changes,
# update both this file and remote-deploy.sh together.

server {
    server_name webtechhq.com www.webtechhq.com;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /_next/static/ {
        alias /srv/webtechhq/current/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /srv/webtechhq/current/public/;
        expires 30d;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/webtechhq.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/webtechhq.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.webtechhq.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = webtechhq.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name webtechhq.com www.webtechhq.com;
    return 404; # managed by Certbot
}
